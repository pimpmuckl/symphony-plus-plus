name: make-all

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gates:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: static
            target: ci-static
          - name: test
            target: ci-test
          - name: dialyzer
            target: ci-dialyzer
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Cache deps and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/mise.toml') }}-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ hashFiles('elixir/mise.toml') }}-

      - name: Verify ${{ matrix.name }}
        run: make ${{ matrix.target }}

  make-all:
    runs-on: ubuntu-latest
    needs:
      - gates
      - slow-tests
    if: ${{ always() }}
    steps:
      - name: Verify split gates
        run: |
          if [ "${{ needs.gates.result }}" != "success" ]; then
            echo "split gate result: ${{ needs.gates.result }}"
            exit 1
          fi
          if [ "${{ needs['slow-tests'].result }}" != "success" ]; then
            echo "slow test result: ${{ needs['slow-tests'].result }}"
            exit 1
          fi
          echo "make-all split gates passed"

  slow-tests:
    name: slow tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Cache deps and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/mise.toml') }}-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ hashFiles('elixir/mise.toml') }}-

      - name: Verify slow tests
        run: make ci-slow
