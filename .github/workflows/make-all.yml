name: make-all

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gates:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: static
            target: ci-static
            partition: ""
            partitions: ""
          - name: test 1/4
            target: ci-test
            partition: 1
            partitions: 4
          - name: test 2/4
            target: ci-test
            partition: 2
            partitions: 4
          - name: test 3/4
            target: ci-test
            partition: 3
            partitions: 4
          - name: test 4/4
            target: ci-test
            partition: 4
            partitions: 4
          - name: dialyzer
            target: ci-dialyzer
            partition: ""
            partitions: ""
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Set up mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Cache deps and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/mise.toml') }}-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ hashFiles('elixir/mise.toml') }}-

      - name: Verify ${{ matrix.name }}
        run: make ${{ matrix.target }}
        env:
          FAST_TEST_PARTITIONS: ${{ matrix.partitions }}
          MIX_TEST_PARTITION: ${{ matrix.partition }}

  make-all:
    runs-on: ubuntu-latest
    needs:
      - gates
      - slow-tests
    if: ${{ always() }}
    steps:
      - name: Verify split gates
        run: |
          if [ "${{ needs.gates.result }}" != "success" ]; then
            echo "split gate result: ${{ needs.gates.result }}"
            exit 1
          fi
          if [ "${{ needs['slow-tests'].result }}" != "success" ]; then
            echo "slow test result: ${{ needs['slow-tests'].result }}"
            exit 1
          fi
          echo "make-all split gates passed"

  slow-tests:
    name: slow tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Set up mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Cache deps and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/mise.toml') }}-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ hashFiles('elixir/mise.toml') }}-

      - name: Verify slow tests
        run: make ci-slow
