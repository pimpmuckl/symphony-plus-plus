name: make-all

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gates:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: static
            target: ci-static
          - name: test
            target: ci-test
          - name: dialyzer
            target: ci-dialyzer
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up mise tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Cache deps and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/mise.toml', 'elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Verify ${{ matrix.name }}
        run: make ${{ matrix.target }}

  make-all:
    runs-on: ubuntu-latest
    needs:
      - gates
      - slow-tests
    if: ${{ always() }}
    steps:
      - name: Verify split gates
        run: |
          if [ "${{ needs.gates.result }}" != "success" ]; then
            echo "split gate result: ${{ needs.gates.result }}"
            exit 1
          fi
          if [ "${{ needs['slow-tests'].result }}" != "success" ]; then
            echo "slow test result: ${{ needs['slow-tests'].result }}"
            exit 1
          fi
          echo "make-all split gates passed"

  slow-tests:
    name: slow tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up mise tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Cache deps and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/mise.toml', 'elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Verify slow tests
        run: make ci-slow
