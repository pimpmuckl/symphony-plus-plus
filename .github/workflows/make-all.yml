name: make-all

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  make-all:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Cache deps and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/mise.toml') }}-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ hashFiles('elixir/mise.toml') }}-

      - name: Stabilize PowerShell diagnostic output
        run: |
          mkdir -p ../.ci-bin
          cat > ../.ci-bin/pwsh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          real_pwsh="/usr/bin/pwsh"
          args=("$@")

          for ((i = 0; i < ${#args[@]}; i++)); do
            lower="$(printf '%s' "${args[$i]}" | tr '[:upper:]' '[:lower:]')"
            if [[ "$lower" == "-file" && $((i + 1)) -lt ${#args[@]} ]]; then
              script="${args[$((i + 1))]}"
              script_args=("${args[@]:$((i + 2))}")
              exec "$real_pwsh" -NoProfile -Command '$PSStyle.OutputRendering = "PlainText"; $ErrorView = "NormalView"; $script = $args[0]; $scriptArgs = if ($args.Count -gt 1) { $args[1..($args.Count - 1)] } else { @() }; & $script @scriptArgs; if ($null -ne $global:LASTEXITCODE) { exit $global:LASTEXITCODE }' "$script" "${script_args[@]}"
            fi
          done

          exec "$real_pwsh" "$@"
          EOF
          chmod +x ../.ci-bin/pwsh
          ln -sf pwsh ../.ci-bin/powershell
          ln -sf pwsh ../.ci-bin/powershell.exe
          echo "$PWD/../.ci-bin" >> "$GITHUB_PATH"

      - name: Verify make all
        run: make all

      - name: Verify asset quality
        run: |
          npm --prefix assets ci
          npm --prefix assets run quality
          npm --prefix assets test
          npm --prefix assets run build
